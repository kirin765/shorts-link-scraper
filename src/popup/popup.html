<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>TikTok Link Scraper</title>
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div>
          <h1>TikTok Short Link Scraper</h1>
          <p>자동 전환되는 TikTok 비디오 링크를 저장합니다.</p>
        </div>
        <span id="count-badge">0</span>
      </header>

      <section class="path-section">
        <label for="csv-path">CSV 저장 경로 (다운로드 폴더 기준)</label>
        <div class="path-controls">
          <input id="csv-path" type="text" value="tiktok_list.csv" />
          <button id="save-path-button" type="button">경로 저장</button>
        </div>
        <p id="path-message" class="path-message"></p>
      </section>

      <section class="actions">
        <button id="copy-button" type="button">전체 복사</button>
        <button id="csv-button" type="button">CSV 저장</button>
        <button id="clear-button" type="button" class="danger">초기화</button>
      </section>

      <section class="meta">
        <p id="status-text">대기 중입니다.</p>
      </section>

      <section>
        <ul id="list" class="list" aria-live="polite"></ul>
      </section>
    </main>

    <script src="popup.js" type="module"></script>
  </body>
</html>
